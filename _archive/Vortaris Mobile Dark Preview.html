<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vortaris Mobile — Dark Mode Preview</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#06080b;}
  iframe{width:100%;height:100%;border:0;display:block;background:#06080b;}
</style>
</head>
<body>
<!-- The page paints itself dark from the ?theme=dark flag (pure CSS),
     so this preview works even when opened directly from disk. -->
<iframe src="Vortaris Mobile.html?theme=dark" title="Vortaris mobile dark preview"></iframe>
</body>
</html>
